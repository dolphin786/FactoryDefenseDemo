name: Build Windows Executable

# 触发条件：手动触发，或推送到 feature/data-driven 分支时
on:
  workflow_dispatch:   # 允许在 GitHub 网页上手动点击触发
  push:
    branches:
      - feature/data-driven
    paths:
      - 'src/**'
      - 'index.html'
      - 'electron/**'
      - 'package.json'
      - 'vite.config.ts'
      - 'tsconfig.json'

jobs:
  build-windows:
    runs-on: windows-latest  # 在 GitHub 提供的 Windows 环境里打包

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建并打包 Windows exe
        run: npm run electron:pack
        env:
          # 跳过代码签名（课程 demo 不需要）
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: factory-defense-win-x64
          path: release/factory-defense-win-x64.exe
          retention-days: 30   # 保留30天
