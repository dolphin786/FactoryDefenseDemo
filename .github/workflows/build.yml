name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    branches:
      - feature/data-driven
    paths:
      - 'src/**'
      - 'index.html'
      - 'electron/**'
      - 'package.json'
      - 'vite.config.ts'
      - 'tsconfig.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 使用 Node.js 24 运行 Actions

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建并打包 Windows exe
        run: npm run electron:pack
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: factory-defense-win-x64
          path: release/factory-defense-win-x64.exe
          retention-days: 30
