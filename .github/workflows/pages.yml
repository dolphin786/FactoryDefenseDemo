name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - feature/data-driven
    paths:
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署，新的会取消旧的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Job 1：构建
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建
        run: npm run build
        env:
          GITHUB_PAGES: true

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Job 2：部署（依赖 build 成功）
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
