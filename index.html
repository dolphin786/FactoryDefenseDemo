<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工厂守卫战 - Factory Defense</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a252f;
  font-family:'Microsoft YaHei','SimHei',sans-serif;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100vh;
  user-select:none;
}
#game-container {
  display:flex; flex-direction:column;
  width:100%; max-width:920px; height:100vh;
}
#top-bar {
  background:#2C3E50; border-bottom:2px solid #34495E;
  padding:5px 10px; display:flex; align-items:center;
  gap:14px; flex-shrink:0; flex-wrap:wrap; min-height:36px;
}
.info-item { color:#ECF0F1; font-size:12px; display:flex; align-items:center; gap:3px; }
.val { color:#F39C12; font-weight:bold; }
.hp-val { color:#27AE60; font-weight:bold; }
.hp-val.low { color:#E74C3C; animation:pulse 0.5s infinite alternate; }
@keyframes pulse { from{opacity:1} to{opacity:0.5} }
#speed-controls { display:flex; gap:4px; margin-left:auto; }
.speed-btn {
  background:#34495E; color:#ECF0F1; border:1px solid #4A6278;
  padding:3px 8px; border-radius:4px; cursor:pointer; font-size:11px;
}
.speed-btn:hover { background:#4A6278; }
.speed-btn.active { background:#F39C12; color:#2C3E50; border-color:#E67E22; font-weight:bold; }
#debug-btn {
  background:#1a3a1a; color:#27AE60; border:1px solid #27AE60;
  padding:3px 8px; border-radius:4px; cursor:pointer; font-size:11px;
}
#game-area {
  flex:1; display:flex; justify-content:center; align-items:center;
  background:#1a252f; overflow:hidden; min-height:0;
}
#resource-bar {
  background:#2C3E50; border-top:1px solid #34495E; border-bottom:1px solid #34495E;
  padding:4px 10px; display:flex; align-items:center; gap:10px;
  flex-shrink:0; flex-wrap:wrap; min-height:28px;
}
.resource-item { display:flex; align-items:center; gap:3px; font-size:11px; color:#BDC3C7; }
.resource-item .rcount { color:#F39C12; font-weight:bold; min-width:20px; text-align:right; }
#card-bar {
  background:#263545; padding:6px 10px; display:flex;
  align-items:center; gap:6px; flex-shrink:0; overflow-x:auto; min-height:86px;
}
#belt-btn {
  background:#607D8B; color:white; border:2px solid #78909C;
  padding:5px 8px; border-radius:6px; cursor:pointer;
  font-size:10px; font-family:inherit; min-width:48px; max-width:52px;
  text-align:center; flex-shrink:0; line-height:1.3;
}
#belt-btn:hover { background:#78909C; }
#belt-btn.active { background:#F39C12; border-color:#E67E22; color:#2C3E50; font-weight:bold; }
.card {
  background:#34495E; border:2px solid #4A6278; border-radius:7px;
  padding:5px 6px; cursor:pointer; min-width:62px; max-width:66px;
  text-align:center; flex-shrink:0; transition:all 0.12s; position:relative;
}
.card:hover { border-color:#F39C12; transform:translateY(-2px); }
.card.selected { border-color:#F39C12; background:#3D5166; box-shadow:0 0 10px #F39C1260; transform:translateY(-3px); }
.card .cicon { font-size:16px; line-height:1.3; }
.card .cname { font-size:9px; color:#ECF0F1; margin-top:1px; font-weight:bold; }
.card .cdesc { font-size:8px; color:#95A5A6; margin-top:1px; }
.card .cdur { position:absolute; top:2px; right:3px; font-size:8px; color:#F39C12; font-weight:bold; }
.card.res { border-color:#27AE60; }
.card.def { border-color:#E74C3C; }
.card.pro { border-color:#3498DB; }
.card.sto { border-color:#F39C12; }
#start-btn {
  background:#27AE60; color:white; border:none;
  padding:8px 16px; border-radius:8px; cursor:pointer;
  font-size:13px; font-family:inherit; font-weight:bold;
  flex-shrink:0; margin-left:auto; white-space:nowrap;
}
#start-btn:hover { background:#2ECC71; }
/* 弹窗 */
#overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.78); z-index:1000;
  display:none; justify-content:center; align-items:center;
}
#overlay.show { display:flex; }
#dialog {
  background:#2C3E50; border:2px solid #F39C12; border-radius:12px;
  padding:24px 32px; text-align:center; max-width:480px; width:92%;
  color:#ECF0F1; box-shadow:0 8px 32px #00000080;
}
#dialog h2 { font-size:22px; margin-bottom:10px; }
#dialog p { font-size:13px; color:#BDC3C7; margin:5px 0; }
.card-choices { display:flex; gap:10px; margin:14px 0; justify-content:center; flex-wrap:wrap; }
.choice-card {
  background:#34495E; border:2px solid #4A6278; border-radius:8px;
  padding:10px 12px; cursor:pointer; min-width:90px; text-align:center; transition:all 0.15s;
}
.choice-card:hover { border-color:#F39C12; background:#3D5166; transform:translateY(-2px); }
.choice-card .cico { font-size:22px; }
.choice-card .cnm  { font-size:11px; margin-top:4px; color:#ECF0F1; }
.dbtn {
  background:#3498DB; color:white; border:none; padding:9px 22px;
  border-radius:8px; cursor:pointer; font-size:13px; font-family:inherit; margin:5px 4px;
}
.dbtn:hover { background:#2980B9; }
.dbtn.red { background:#E74C3C; } .dbtn.red:hover { background:#C0392B; }
.dbtn.grn { background:#27AE60; } .dbtn.grn:hover { background:#2ECC71; }
/* 起始卡组 */
.starter-decks { display:flex; gap:12px; margin:14px 0; justify-content:center; flex-wrap:wrap; }
.starter-deck {
  background:#34495E; border:2px solid #4A6278; border-radius:10px;
  padding:14px 16px; cursor:pointer; width:130px; text-align:center; transition:all 0.15s;
}
.starter-deck:hover { transform:translateY(-3px); box-shadow:0 6px 16px #00000060; }
.starter-deck .dk-icon { font-size:28px; margin-bottom:6px; }
.starter-deck .dk-name { font-size:13px; font-weight:bold; color:#ECF0F1; margin-bottom:4px; }
.starter-deck .dk-desc { font-size:10px; color:#95A5A6; }
.starter-deck .dk-cards { margin-top:8px; font-size:9px; color:#BDC3C7; line-height:1.6; text-align:left; }
/* 波次提示 */
#wave-announce {
  position:fixed; top:45%; left:50%; transform:translate(-50%,-50%);
  background:rgba(231,76,60,0.92); color:white; font-size:26px; font-weight:bold;
  padding:14px 32px; border-radius:10px; pointer-events:none; z-index:500;
  display:none; text-shadow:0 2px 4px #00000060; border:2px solid rgba(255,255,255,0.3);
}
#hint-bar {
  position:fixed; bottom:92px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.75); color:#F39C12; font-size:11px;
  padding:3px 12px; border-radius:4px; pointer-events:none; z-index:400;
  display:none; white-space:nowrap;
}
/* Debug 面板 */
#debug-panel {
  display:none; position:fixed; top:40px; right:0; width:320px;
  height:calc(100vh - 40px); background:rgba(10,14,18,0.93);
  border-left:2px solid #27AE60; z-index:2000; flex-direction:column; font-family:monospace;
}
#debug-panel.show { display:flex; }
#debug-header {
  background:#1a2e1a; padding:4px 8px; display:flex;
  align-items:center; justify-content:space-between;
  flex-shrink:0; border-bottom:1px solid #27AE60;
}
#debug-header span { color:#27AE60; font-size:11px; font-weight:bold; }
#debug-header button { background:none; border:1px solid #27AE60; color:#27AE60; font-size:10px; padding:1px 6px; border-radius:3px; cursor:pointer; }
#debug-filter { display:flex; gap:4px; padding:4px 8px; flex-shrink:0; border-bottom:1px solid #263238; flex-wrap:wrap; }
.df-btn { font-size:9px; padding:1px 5px; border-radius:3px; cursor:pointer; border:1px solid #37474F; background:#1a252f; color:#7F8C8D; }
.df-btn.on { background:#1a3a1a; color:#27AE60; border-color:#27AE60; }
#debug-log { flex:1; overflow-y:auto; padding:4px 8px; font-size:10px; line-height:1.6; }
#debug-log .dl { display:block; border-bottom:1px solid #1a252f; padding:1px 0; white-space:pre-wrap; word-break:break-all; }
#debug-log .dl.belt  { color:#3498DB; }
#debug-log .dl.prod  { color:#F39C12; }
#debug-log .dl.ammo  { color:#E74C3C; }
#debug-log .dl.warn  { color:#E74C3C; font-weight:bold; }
#debug-log .dl.info  { color:#95A5A6; }
#debug-log .dl.tower { color:#E67E22; }
</style>
</head>
<body>
<div id="game-container">
  <div id="top-bar">
    <div class="info-item">💎核心: <span class="hp-val" id="core-hp">200/200</span></div>
    <div class="info-item">🌊波次: <span class="val" id="wave-info">0/3</span></div>
    <div class="info-item" id="cd-wrap" style="display:none">⏱下波: <span class="val" id="wave-cd">--</span>s</div>
    <div class="info-item">🏆关卡: <span class="val" id="level-info">1</span></div>
    <div class="info-item" id="phase-info" style="color:#95A5A6">【准备阶段】</div>
    <div id="speed-controls">
      <button class="speed-btn" id="btn-pause" onclick="setSpeed(0)">⏸暂停</button>
      <button class="speed-btn active" id="btn-1x" onclick="setSpeed(1)">1x</button>
      <button class="speed-btn" id="btn-2x" onclick="setSpeed(2)">2x</button>
      <button class="speed-btn" id="btn-4x" onclick="setSpeed(4)">4x</button>
      <button id="debug-btn" onclick="toggleDebug()">🔬Debug</button>
    </div>
  </div>
  <div id="game-area"></div>
  <div id="resource-bar">
    <span style="color:#95A5A6;font-size:11px;flex-shrink:0">资源:</span>
    <div class="resource-item">⛏铁矿<span class="rcount" id="res-iron_ore">0</span></div>
    <div class="resource-item">🪨铜矿<span class="rcount" id="res-copper_ore">0</span></div>
    <div class="resource-item">🔩铁板<span class="rcount" id="res-iron_plate">0</span></div>
    <div class="resource-item">🟤铜板<span class="rcount" id="res-copper_plate">0</span></div>
    <div class="resource-item">🟡子弹<span class="rcount" id="res-bullet">0</span></div>
  </div>
  <div id="card-bar">
    <button id="belt-btn" onclick="toggleBeltMode()">传送带<br>→</button>
    <div id="hand-cards" style="display:flex;gap:6px;align-items:center;"></div>
    <button id="start-btn" onclick="startDefense()">▶ 开始防御</button>
  </div>
</div>

<div id="wave-announce"></div>
<div id="hint-bar">R键旋转方向 | 右键取消</div>

<div id="debug-panel">
  <div id="debug-header">
    <span>🔬 传送带调试日志</span>
    <button onclick="clearDebugLog()">清空</button>
  </div>
  <div id="debug-filter">
    <span style="color:#7F8C8D;font-size:9px;align-self:center">过滤:</span>
    <button class="df-btn on" data-tag="belt"  onclick="toggleFilter(this)">传送带</button>
    <button class="df-btn on" data-tag="prod"  onclick="toggleFilter(this)">生产</button>
    <button class="df-btn on" data-tag="ammo"  onclick="toggleFilter(this)">弹药</button>
    <button class="df-btn on" data-tag="tower" onclick="toggleFilter(this)">炮塔</button>
    <button class="df-btn on" data-tag="warn"  onclick="toggleFilter(this)">警告</button>
    <button class="df-btn on" data-tag="info"  onclick="toggleFilter(this)">信息</button>
  </div>
  <div id="debug-log"></div>
</div>

<div id="overlay">
  <div id="dialog">
    <h2 id="dlg-title"></h2>
    <div id="dlg-body"></div>
    <div id="dlg-btns"></div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
